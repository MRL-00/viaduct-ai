project_name: viaduct

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: viaduct
    main: ./cmd/viaduct
    binary: viaduct
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}

checksum:
  name_template: checksums.txt

changelog:
  use: git
